<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="ball_grad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>
    <linearGradient id="field_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d8a4e"/>
      <stop offset="100%" stop-color="#1a5c32"/>
    </linearGradient>
    <linearGradient id="sky_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a4e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky_grad)"/>
  
  <!-- Field -->
  <rect x="0" y="350" width="800" height="150" fill="url(#field_grad)"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="#3aa05e" stroke-width="2"/>
  
  <!-- Field lines -->
  <rect x="50" y="360" width="150" height="100" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <rect x="600" y="360" width="150" height="100" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="350" x2="400" y2="500" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="425" r="50" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Corner flags -->
  <g id="CornerFlag_Left">
    <line x1="50" y1="350" x2="50" y2="320" stroke="#ff6b6b" stroke-width="2"/>
    <polygon points="50,320 70,325 50,330" fill="#ff6b6b"/>
  </g>
  <g id="CornerFlag_Right">
    <line x1="750" y1="350" x2="750" y2="320" stroke="#ff6b6b" stroke-width="2"/>
    <polygon points="750,320 770,325 750,330" fill="#ff6b6b"/>
  </g>

  <!-- Goal left -->
  <g id="Goal_Left">
    <rect x="20" y="370" width="5" height="80" fill="white" opacity="0.5"/>
    <rect x="20" y="370" width="30" height="5" fill="white" opacity="0.5"/>
    <rect x="45" y="370" width="5" height="80" fill="white" opacity="0.5"/>
  </g>

  <!-- Goal right -->
  <g id="Goal_Right">
    <rect x="775" y="370" width="5" height="80" fill="white" opacity="0.5"/>
    <rect x="750" y="370" width="30" height="5" fill="white" opacity="0.5"/>
    <rect x="750" y="370" width="5" height="80" fill="white" opacity="0.5"/>
  </g>

  <!-- Soccer Ball (will follow arc trajectory) -->
  <g id="SoccerBall">
    <circle cx="70" cy="340" r="15" fill="url(#ball_grad)" stroke="#333" stroke-width="1"/>
    <!-- Pentagon pattern -->
    <polygon points="70,328 75,332 73,338 67,338 65,332" fill="#333" opacity="0.6"/>
    <polygon points="82,340 80,346 75,348 72,344 74,338" fill="#333" opacity="0.4"/>
    <polygon points="58,340 60,346 65,348 68,344 66,338" fill="#333" opacity="0.4"/>
    <polygon points="65,352 70,354 75,352 73,347 67,347" fill="#333" opacity="0.4"/>
    <!-- Ball shadow -->
    <ellipse cx="70" cy="358" rx="12" ry="3" fill="#000" opacity="0.3"/>
  </g>

  <!-- Arc trajectory visualization (dotted line) -->
  <g id="TrajectoryVisual" opacity="0.4">
    <path d="M 70 340 Q 200 150 400 200 Q 600 250 730 340" 
          fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="8,4"/>
    <!-- Trajectory points -->
    <circle cx="70" cy="340" r="4" fill="#51cf66"/>
    <circle cx="200" cy="220" r="3" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="400" cy="200" r="3" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="600" cy="260" r="3" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="730" cy="340" r="4" fill="#ff6b6b"/>
  </g>

  <!-- Axis visualization (invisible on export) -->
  <g id="AxisVisual" data-axis-visual="true">
    <circle cx="400" cy="340" r="200" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
    <circle cx="400" cy="340" r="3" fill="#ff6b6b" opacity="0.5"/>
    <line x1="200" y1="340" x2="600" y2="340" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>
    <line x1="400" y1="140" x2="400" y2="540" stroke="#ff6b6b" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Labels -->
  <text x="70" y="380" fill="#51cf66" font-size="12" text-anchor="middle">Corner</text>
  <text x="730" y="380" fill="#ff6b6b" font-size="12" text-anchor="middle">Gol</text>
  <text x="400" y="180" fill="#ff6b6b" font-size="11" text-anchor="middle" opacity="0.6">Trayectoria arco</text>
  <text x="400" y="500" fill="#888" font-size="10" text-anchor="middle">Eje invisible (solo visible en edición)</text>

</svg>