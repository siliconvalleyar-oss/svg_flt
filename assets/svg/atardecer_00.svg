<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1408 768" width="1408" height="768" style="transform: scale(1);"><style>@keyframes svgFade { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
@keyframes svgPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

[data-anim-index="7"] { transform-origin: 704px 376.5px; transform-box: view-box;  animation: svgFade 25.6s ease-in-out infinite normal; animation-delay: 0s; }
[data-anim-index="15"] { transform-origin: 700px 390px; transform-box: view-box;  animation: svgFade 16s ease-in-out infinite normal; animation-delay: 0s; }
[data-anim-index="16"] { transform-origin: 700px 390px; transform-box: view-box;  animation: svgFade 16s ease-in-out infinite normal; animation-delay: 0s; }
[data-anim-index="17"] { transform-origin: 700px 390px; transform-box: view-box;  animation: svgFade 16s ease-in-out infinite normal; animation-delay: 0s; }
[data-anim-index="23"] { transform-origin: 704px 637.5px; transform-box: view-box;  animation: svgPulse 6.8s ease-in-out infinite normal; animation-delay: 0s; }
</style>

  <!-- ============================================================
       PAISAJE DE MONTAÑAS AL ATARDECER — VERSIÓN VECTORIAL SVG
       Estructura pensada para animación (CSS / JS / GSAP / SMIL):
       - Cada capa tiene su propio <g id="..."> con nombre semántico.
       - Jerarquía por profundidad (z): cielo -> sol -> montañas
         (de más lejana a más cercana) -> bosque -> destello.
       - Cada pieza individual (montaña, árbol, sol) tiene su propio
         id para poder animarla por separado.
       - Los grupos usan transform-origin implícito en el centro de
         su propio bounding box vía atributo data-pivot (referencia
         para tu script de animación).
       ============================================================ -->

  <defs>
    <!-- Gradientes de cielo -->
    <linearGradient id="skyGradTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3b6e"/>
      <stop offset="35%" stop-color="#8a4a6a"/>
      <stop offset="65%" stop-color="#c9556a"/>
      <stop offset="100%" stop-color="#e0703f"/>
    </linearGradient>

    <linearGradient id="skyGradLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8783f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e8863a"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6d8" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffcf8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffcf8a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sunCore" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fffdf3"/>
      <stop offset="60%" stop-color="#ffe9b0"/>
      <stop offset="100%" stop-color="#f7b563"/>
    </radialGradient>

    <!-- Gradientes de montañas, de más lejana (clara) a más cercana (oscura) -->
    <linearGradient id="mFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6c9a6"/>
      <stop offset="100%" stop-color="#eeb48c"/>
    </linearGradient>
    <linearGradient id="mMid1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eeab7c"/>
      <stop offset="100%" stop-color="#e6975f"/>
    </linearGradient>
    <linearGradient id="mMid2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6905a"/>
      <stop offset="100%" stop-color="#db7c46"/>
    </linearGradient>
    <linearGradient id="mMid3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97b48"/>
      <stop offset="100%" stop-color="#c2603a"/>
    </linearGradient>
    <linearGradient id="mNear1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8552f"/>
      <stop offset="100%" stop-color="#8f3624"/>
    </linearGradient>
    <linearGradient id="mNear2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a2a20"/>
      <stop offset="100%" stop-color="#4a1712"/>
    </linearGradient>
    <linearGradient id="mForeground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1210"/>
      <stop offset="100%" stop-color="#1c0705"/>
    </linearGradient>

    <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1512"/>
      <stop offset="100%" stop-color="#170504"/>
    </linearGradient>

    <!-- Símbolo de árbol reutilizable, para instanciar con <use> -->
    <g id="tree" style="animation-play-state: running;">
      <path d="M0,-92 L14,-58 L6,-58 L20,-30 L9,-30 L24,-2 L-24,-2 L-9,-30 L-20,-30 L-6,-58 L-14,-58 Z" fill="url(#treeGrad)" style="animation-play-state: running;"/>
      <rect x="-4" y="-4" width="8" height="10" fill="#170504" style="animation-play-state: running;"/>
    </g>

    <!-- Destello de 4 puntas -->
    <g id="sparkle" style="animation-play-state: running;">
      <path d="M0,-22 C1.5,-7 3,-3 18,0 C3,3 1.5,7 0,22 C-1.5,7 -3,3 -18,0 C-3,-3 -1.5,-7 0,-22 Z" fill="#f4e9e6" opacity="0.9" style="animation-play-state: running;"/>
    </g>

    <clipPath id="canvasClip">
      <rect x="0" y="0" width="1408" height="768" style="animation-play-state: running;"/>
    </clipPath>
  </defs>

  <g id="scene" clip-path="url(#canvasClip)" style="animation-play-state: running;">

    <!-- ================= CAPA 1: CIELO ================= -->
    <g id="sky-layer" data-pivot="704,0" style="animation: 25.6s ease-in-out infinite svgFade; transform-origin: 704px 376.5px 0px; transform-box: view-box;" class="" data-anim-index="7">
      <rect id="sky-base" x="0" y="0" width="1408" height="768" fill="url(#skyGradTop)" style="animation-play-state: running;"/>
      <rect id="sky-glow-low" x="0" y="250" width="1408" height="300" fill="url(#skyGradLow)" style="animation-play-state: running;"/>

      <!-- Bandas curvas decorativas del cielo (ideales para animar con leve balanceo / parallax) -->
      <g id="sky-bands" opacity="0.55" style="animation-play-state: running;">
        <path id="band-1" d="M-100,120 C300,10 1100,10 1508,120 L1508,60 C1100,-40 300,-40 -100,60 Z" fill="#9a4f7e" opacity="0.5" style="animation-play-state: running;"/>
        <path id="band-2" d="M-100,210 C320,90 1090,90 1508,210 L1508,160 C1090,50 320,50 -100,160 Z" fill="#b1557a" opacity="0.45" style="animation-play-state: running;"/>
        <path id="band-3" d="M-100,300 C340,170 1070,170 1508,300 L1508,255 C1070,135 340,135 -100,255 Z" fill="#c9636f" opacity="0.4" style="animation-play-state: running;"/>
        <path id="band-4" d="M-100,150 C500,235 910,235 1508,150 L1508,190 C910,270 500,270 -100,190 Z" fill="#7d3f78" opacity="0.35" style="animation-play-state: running;"/>
      </g>
    </g>

    <!-- ================= CAPA 2: SOL ================= -->
    <g id="sun-layer" data-pivot="700,390" style="animation: 16s ease-in-out infinite svgFade; transform-origin: 700px 390px 0px; transform-box: view-box;" class="" data-anim-index="15">
      <circle id="sun-glow" cx="700" cy="390" r="230" fill="url(#sunGlow)" style="animation: 16s ease-in-out infinite svgFade; transform-origin: 700px 390px 0px; transform-box: view-box;" class="" data-anim-index="16"/>
      <circle id="sun-core" cx="700" cy="390" r="112" fill="url(#sunCore)" style="animation: 16s ease-in-out infinite svgFade; transform-origin: 700px 390px 0px; transform-box: view-box;" class="" data-anim-index="17"/>
    </g>

    <!-- ================= CAPAS 3-8: MONTAÑAS (lejana -> cercana) ================= -->
    <g id="mountains-far" data-pivot="704,600" opacity="0.92" style="animation-play-state: running;">
      <path id="mtn-far-1" fill="url(#mFar)" d="M0,768 L0,417 L141,433 L282,449 L422,445 L563,447 L704,432 L845,450 L986,437 L1126,414 L1267,433 L1408,412 L1408,768 Z" style="animation-play-state: running;"/>
    </g>

    <g id="mountains-mid1" data-pivot="704,600" style="animation-play-state: running;">
      <path id="mtn-mid1-1" fill="url(#mMid1)" d="M0,768 L0,489 L156,470 L313,508 L469,506 L626,483 L782,493 L939,471 L1095,471 L1252,474 L1408,495 L1408,768 Z" style="animation-play-state: running;"/>
    </g>

    <g id="mountains-mid2" data-pivot="704,600" style="animation-play-state: running;">
      <path id="mtn-mid2-1" fill="url(#mMid2)" d="M0,768 L0,513 L176,539 L352,514 L528,544 L704,538 L880,526 L1056,539 L1232,536 L1408,507 L1408,768 Z" style="animation: 6.8s ease-in-out infinite svgPulse; transform-origin: 704px 637.5px 0px; transform-box: view-box;" class="element-selected" data-anim-index="23"/>
    </g>

    <g id="mountains-mid3" data-pivot="704,620" style="animation-play-state: running;">
      <path id="mtn-mid3-1" fill="url(#mMid3)" d="M0,768 L0,604 L176,575 L352,590 L528,590 L704,562 L880,554 L1056,583 L1232,557 L1408,571 L1408,768 Z" style="animation-play-state: running;" class=""/>
    </g>

    <g id="mountains-near1" data-pivot="704,650" style="animation-play-state: running;">
      <path id="mtn-near1-1" fill="url(#mNear1)" d="M0,768 L0,648 L201,643 L402,635 L603,608 L805,613 L1006,634 L1207,639 L1408,596 L1408,768 Z" style="animation-play-state: running;"/>
    </g>

    <g id="mountains-near2" data-pivot="704,690" style="animation-play-state: running;">
      <path id="mtn-near2-1" fill="url(#mNear2)" d="M0,768 L0,691 L235,654 L469,685 L704,697 L939,652 L1173,684 L1408,653 L1408,768 Z" style="animation-play-state: running;"/>
    </g>

    <!-- ================= CAPA 9: COLINA DE PRIMER PLANO + BOSQUE ================= -->
    <g id="foreground-layer" data-pivot="704,720" style="animation-play-state: running;">
      <path id="foreground-hill" fill="url(#mForeground)" d="M0,768 L0,720 C220,700 380,738 560,715 C760,690 900,732 1120,708 C1260,694 1340,715 1408,700 L1408,768 Z" style="animation-play-state: running;" class=""/>

      <!-- Bosque izquierdo -->
      <g id="forest-left" data-pivot="180,730" style="animation-play-state: running;">
        <use href="#tree" x="10" y="768" transform="scale(1.3)"/>
        <use href="#tree" x="55" y="760" transform="scale(1.5)"/>
        <use href="#tree" x="105" y="768" transform="scale(1.1)"/>
        <use href="#tree" x="150" y="758" transform="scale(1.4)"/>
        <use href="#tree" x="195" y="768" transform="scale(1.0)"/>
        <use href="#tree" x="235" y="750" transform="scale(1.6)"/>
        <use href="#tree" x="285" y="768" transform="scale(1.2)"/>
        <use href="#tree" x="325" y="762" transform="scale(0.9)"/>
        <use href="#tree" x="365" y="768" transform="scale(1.15)"/>
      </g>

      <!-- Bosque derecho -->
      <g id="forest-right" data-pivot="1230,730" style="animation-play-state: running;">
        <use href="#tree" x="1000" y="768" transform="scale(1.1)"/>
        <use href="#tree" x="1045" y="758" transform="scale(1.4)"/>
        <use href="#tree" x="1090" y="768" transform="scale(0.95)"/>
        <use href="#tree" x="1130" y="748" transform="scale(1.6)"/>
        <use href="#tree" x="1180" y="765" transform="scale(1.1)"/>
        <use href="#tree" x="1225" y="756" transform="scale(1.35)"/>
        <use href="#tree" x="1270" y="768" transform="scale(1.0)"/>
        <use href="#tree" x="1310" y="750" transform="scale(1.5)"/>
        <use href="#tree" x="1355" y="768" transform="scale(1.2)"/>
        <use href="#tree" x="1395" y="760" transform="scale(1.1)"/>
      </g>
    </g>

    <!-- ================= CAPA 10: DESTELLO ================= -->
    <g id="sparkle-layer" data-pivot="1290,635" style="animation-play-state: running;">
      <use id="sparkle-1" href="#sparkle" x="1290" y="635" transform="scale(1.3)"/>
    </g>

  </g>
</svg>